services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8080:80"
    env_file: .env
    environment:
      PORT: 4001
      DB_PATH: /data/arena.db
    volumes:
      - arena-data:/data

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_COGNITO_DOMAIN: arena-admin.auth.us-east-1.amazoncognito.com
        VITE_COGNITO_CLIENT_ID: 3m1dh51noh49kblvjhgvuvjj1d
        VITE_REDIRECT_URI: http://localhost:8081
    ports:
      - "8081:8080"
    environment:
      PORT: 3000
      PROCTOR_URL: http://app:4001
      VIDEOGRAPHER_URL: http://videographer:3001
      COGNITO_USER_POOL_ID: us-east-1_ceAFjiItB
      COGNITO_CLIENT_ID: 3m1dh51noh49kblvjhgvuvjj1d
    depends_on:
      - app

  videographer:
    build:
      context: .
      dockerfile: Dockerfile.videographer
    env_file: .env
    environment:
      FRONTEND_URL: http://app/
      PROCTOR_URL: http://app:4001
      CHROME_PATH: /usr/bin/chromium
    depends_on:
      - app

volumes:
  arena-data:
